name: Build Storybook to Design Review on trigger

on:
  issue_comment:
    types: [ created ]
  workflow_call:
    inputs:
      branch_name:
        type: string
        required: true
      pr_number:
        type: string
        required: true

jobs:
  deploy-for-review:
    runs-on: ubuntu-latest
    env:
      FONT_AWESOME_AUTH_TOKEN: ${{ secrets.FONT_AWESOME_AUTH_TOKEN }}

    if: |
      inputs.branch_name != '' ||
      (github.event.comment &&
       github.event.issue.pull_request &&
       startsWith(github.event.comment.body, '/review'))

    steps:
      - name: Get PR branch name
        id: comment-pr-ref
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v6
        with:
          result-encoding: string
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.issue.owner,
              repo: context.issue.repo,
              pull_number: context.issue.number,
            });
            return pr.data.head.ref

      - name: Set short branch name
        run: |
          echo "BRANCH_NAME=${{ inputs.branch_name || steps.comment-pr-ref.outputs.result }}" >> $GITHUB_ENV

      - name: Checkout PR code based on trigger comment
        uses: actions/checkout@v3
        with:
          ref: ${{ inputs.branch_name || steps.comment-pr-ref.outputs.result }}

      - uses: actions/setup-node@v3
        with:
          node-version: '20.9.0'

      - uses: actions/cache@v4
        name: Cache node_modules
        id: cache-node-modules
        with:
          path: node_modules
          key: design-system-node-modules-${{ hashFiles('yarn.lock') }}

      - name: Install and Build 🔧
        run: |
          yarn install --immutable --immutable-cache
          yarn storybook:build

      - name: Push to S3 🚀
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}
          AWS_DEFAULT_REGION: eu-central-1
        run: |
          DEST="s3://${{ vars.S3_REVIEW_BUCKET }}/${{ env.BRANCH_NAME }}/"
          # Everything except js/css — sync infers correct content-types
          aws s3 sync docs/ "$DEST" --no-progress --acl public-read \
            --exclude "*.js" --exclude "*.css"
          # .js files with explicit Content-Type
          aws s3 sync docs/ "$DEST" --no-progress --acl public-read \
            --exclude "*" --include "*.js" --content-type "application/javascript"
          # .css files with explicit Content-Type
          aws s3 sync docs/ "$DEST" --no-progress --acl public-read \
            --exclude "*" --include "*.css" --content-type "text/css"

      - name: Add comment with URL
        uses: thollander/actions-comment-pull-request@v2
        with:
          pr_number: ${{ inputs.pr_number || github.event.issue.number }}
          message: |
            Your storybook is available on: https://${{ vars.S3_REVIEW_BUCKET }}.s3.amazonaws.com/${{ env.BRANCH_NAME }}/index.html
