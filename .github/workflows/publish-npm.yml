name: Publish to NPM

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Version bump type'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: write
      id-token: write
    env:
      FONT_AWESOME_AUTH_TOKEN: ${{ secrets.FONT_AWESOME_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'
          registry-url: 'https://registry.npmjs.org'
      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@11.17.0
      - uses: actions/cache@v5
        name: Cache node_modules
        id: cache-node-modules
        with:
          path: node_modules
          key: design-system-node-modules-${{ hashFiles('yarn.lock') }}
      - name: Install and Build 🔧
        run: | # Install npm packages, build dist and Storybook
          yarn install --immutable --immutable-cache
          yarn build
          yarn storybook:build
          touch ./docs/.nojekyll
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Bump version and commit build output
        id: bump
        run: |
          NEW_VERSION=$(npm version ${{ inputs.release_type }} --no-git-tag-version)
          git add -A
          git commit -m "Release $NEW_VERSION: bump version, build dist and Storybook"
          git tag -a "$NEW_VERSION" -m "$NEW_VERSION"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
      - name: Push commit and tag
        run: git push origin HEAD:master --follow-tags
      - name: Create GitHub release
        run: gh release create "${{ steps.bump.outputs.version }}" --generate-notes --title "${{ steps.bump.outputs.version }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish
        # OIDC Trusted Publishing: npm exchanges the GitHub-issued id-token for a
        # short-lived publish credential. No NPM_TOKEN needed.
        # Requires id-token: write permission (above) and a Trusted Publisher
        # configured on the package at npmjs.com.
        run: npm publish --access public --provenance
